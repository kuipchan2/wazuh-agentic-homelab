name: Wazuh Agentic AI - CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests anthropic

      - name: Run unit tests
        run: |
          python3 tests/test_triage_agent.py

      - name: Check code style (flake8)
        run: |
          pip install flake8
          flake8 phase3/ phase4/ tests/ \
            --max-line-length=120 \
            --ignore=E501,W503,E302,E303,E221,E226,E305,E402,F541,F401,E712

      - name: Verify no secrets in code
        run: |
          if grep -r "sk-ant-" . --include="*.py"; then
            echo "❌ Anthropic API key found in code!"
            exit 1
          fi
          if grep -r "ghp_" . --include="*.py"; then
            echo "❌ GitHub token found in code!"
            exit 1
          fi
          echo "✅ No secrets found"
